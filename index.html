<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Life Rainbow™ | Executive Edition</title>
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;400;500;700&display=swap');

    :root {
      --mental: #f6a6c8; --health: #ef8f8f; --work: #f4d35e; --money: #b9d86b;
      --learning: #62b66e; --hobby: #7ed6df; --living: #5dade2; --relation: #a084dc;
      --ink: #2c3e50; --gold: #c5a059;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      background: #fff;
    }

    /* エグゼクティブ・オーロラ背景 */
    .aurora-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: linear-gradient(135deg, #fffcf9 0%, #f7f9fc 100%);
    }
    .aurora-sphere {
      position: absolute;
      filter: blur(80px);
      border-radius: 50%;
      opacity: 0.4;
      animation: float 20s infinite alternate ease-in-out;
    }
    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(100px, 50px) scale(1.2); }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-luxury {
      background: linear-gradient(135deg, #2c3e50 0%, #4a69bd 100%);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: 0.2em;
    }
    .btn-luxury:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 20px 40px rgba(44, 62, 80, 0.2);
    }

    .rainbow-progress {
      height: 3px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }
    .rainbow-progress-fill {
      height: 100%;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .logo-container {
      animation: subtleFloat 6s infinite ease-in-out;
    }
    @keyframes subtleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .text-reveal {
      animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-12">
  
  <div class="aurora-bg">
    <div class="aurora-sphere w-[500px] h-[500px] bg-[#f6a6c8] -top-20 -left-20"></div>
    <div class="aurora-sphere w-[600px] h-[600px] bg-[#7ed6df] top-1/4 -right-20" style="animation-delay: -5s;"></div>
    <div class="aurora-sphere w-[400px] h-[400px] bg-[#a084dc] -bottom-20 left-1/3" style="animation-delay: -10s;"></div>
  </div>

  <div id="root" class="w-full max-w-2xl"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const categories = [
      { id: 'mental', name: 'MENTAL', jp: 'メンタル', color: 'var(--mental)', 
        questions: ['本当は変わりたいのに、「自分には無理かもしれない」と感じることがある。', 'うまくいかない理由を、自分の性格や過去のせいにしてしまうことがある。', '人と比べて、自分には足りないものばかり見えてしまうことがある。', '褒められても素直に受け取れず、「まだまだ」と思ってしまう。', '本音よりも、周りからどう見られるかを優先してしまうことがある。'],
        hook: 'あなたは「自分を信じる許可」が出た瞬間、人生の見え方が大きく変わるタイプです。', insight: '本当はもっと自由に、自分を信じて進みたい気持ちがありそうです。', firstStep: '今の自分を、一度だけ無条件に許してあげましょう。' },
      { id: 'health', name: 'HEALTH', jp: '健康', color: 'var(--health)', 
        questions: ['自分の体調や疲れを後回しにして、無理を続けてしまうことがある。', '健康を整えたいと思っても、「忙しいから仕方ない」と諦めてしまう。', '休むことに罪悪感があり、つい予定を詰め込んでしまう。', '睡眠・食事・運動を整えたいと思いながら、後回しになりやすい。', '体からの小さなサインに気づいても、まだ大丈夫だと思ってしまう。'],
        hook: 'あなたは「回復する許可」を取り戻すと、本来の輝きが戻りやすいタイプです。', insight: '身体の声を聞くことが、最大のパフォーマンスアップに繋がります。', firstStep: '今日だけは、5分早く目を閉じる時間を作ってみてください。' },
      { id: 'work', name: 'WORK', jp: '仕事', color: 'var(--work)', 
        questions: ['今の仕事や役割に違和感があっても、「これが現実だから」と我慢している。', '自分の本当にやりたい仕事を考えると、現実的ではない気がしてしまう。', '仕事で評価されるために、自分らしさを抑えていると感じることがある。', '本当は挑戦したいことがあっても、安定を手放すのが怖い。', '自分の強みや価値が、仕事で十分に活かされていない気がする。'],
        hook: 'あなたは「誰に何を届けたいか」を言語化すると、爆発的な創造性が目覚めます。', insight: '今の役割を超えた、あなただけの真の貢献が待っています。', firstStep: '本当はやってみたかった小さなアイデアを、メモに残してみましょう。' },
      { id: 'money', name: 'MONEY', jp: 'お金', color: 'var(--money)', 
        questions: ['お金を使うことに、どこか罪悪感や不安を感じることがある。', '自分がもっと豊かになっていい、とは心から思えないことがある。', 'お金の話をすることに、抵抗感や恥ずかしさがある。', '欲しいものがあっても、「自分には贅沢かも」と思ってしまう。', '収入や価格を上げることに、どこか申し訳なさを感じる。'],
        hook: 'あなたは「豊かさを受け取ること」に自分自身で許可を出す必要があります。', insight: 'お金はあなたの価値を循環させる、愛のあるエネルギーです。', firstStep: '自分への「投資」として、小さな贅沢をひとつ自分に贈ってみましょう。' },
      { id: 'learning', name: 'LEARNING', jp: '学び', color: 'var(--learning)', 
        questions: ['学びたい気持ちはあるのに、「今さら遅い」と感じることがある。', '新しいことを始める前に、失敗や継続できない自分を想像して止まってしまう。', '完璧に準備できるまで、始めない方がいいと思ってしまう。', '学んでも結果につながらなかったらどうしよう、と不安になる。', '自分より詳しい人を見ると、始める前から自信をなくしてしまう。'],
        hook: 'あなたは「完璧さ」を脱ぎ捨てたとき、最も吸収力が高まるタイプです。', insight: '学びは目的ではなく、あなたの人生を豊かにする遊びです。', firstStep: '1ページだけ、あるいは1分だけ、興味があることに触れてみてください。' },
      { id: 'hobby', name: 'HOBBY', jp: '趣味', color: 'var(--hobby)', 
        questions: ['好きなことをする時間に、どこか罪悪感を覚えることがある。', '趣味や楽しみは「余裕がある人のもの」だと思ってしまう。', '役に立つことや成果につながることを優先し、楽しみを後回しにしやすい。', '自分が何を好きなのか、すぐに答えられないことがある。', '楽しんでいる自分を、人に見せるのが少し恥ずかしい。'],
        hook: 'あなたは「無駄」を楽しむ余裕を持つことで、人生の彩りが劇的に変わります。', insight: '趣味はあなたの魂を、本来の場所へ戻してくれるセラピーです。', firstStep: '誰の役にも立たないけれど、自分がワクワクすることをひとつだけ実行しましょう。' },
      { id: 'living', name: 'LIVING', jp: '暮らし', color: 'var(--living)', 
        questions: ['本当は暮らし方を変えたいのに、「今の環境では難しい」と思っている。', '自分が心地よく過ごすことより、日々をこなすことを優先している。', '住まいや持ち物、時間の使い方に違和感があっても見ないふりをしている。', '理想の暮らしを考えると、今の自分にはまだ遠いと感じる。', '日常を整えることより、目の前の予定をこなすことが多い。'],
        hook: 'あなたは住環境をわずかに整えるだけで、思考が驚くほどクリアになります。', insight: '暮らしはあなたの心の鏡です。一箇所だけ、光を通しましょう。', firstStep: 'デスクの上、あるいはベッドサイド。ひとつだけお気に入りを飾ってください。' },
      { id: 'relation', name: 'RELATIONSHIP', jp: '人間関係', color: 'var(--relation)', 
        questions: ['本音を言うと嫌われる、迷惑をかける、と思ってしまうことがある。', '人に頼るより、自分で抱え込んだ方が楽だと感じることがある。', '相手に合わせすぎて、自分の気持ちが分からなくなることがある。', '断ることやお願いすることに、強いハードルを感じる。', '本当はもっと安心してつながりたいのに、距離を取ってしまうことがある。'],
        hook: 'あなたは「弱さを見せる勇気」が、真の深い繋がりを呼ぶタイプです。', insight: 'ひとりで頑張る世界から、共に響き合う世界へ移行する時です。', firstStep: '信頼できる誰かに、今の正直な気持ちを「一言だけ」伝えてみましょう。' }
    ];

    const Logo = () => (
      <div className="logo-container flex justify-center mb-12">
        <img src="logo.png" alt="Logo" className="h-28 object-contain" />
      </div>
    );

    function App() {
      const [step, setStep] = useState('welcome');
      const [qIdx, setQIdx] = useState(0);
      const [scores, setScores] = useState({});

      const totalQs = categories.length * 5;
      const currentCat = categories[Math.floor(qIdx / 5)];

      const handleAnswer = (val) => {
        setScores({ ...scores, [currentCat.id]: (scores[currentCat.id] || 0) + val });
        if (qIdx < totalQs - 1) setQIdx(qIdx + 1);
        else setStep('result');
      };

      const topCat = Object.keys(scores).length > 0 
        ? categories.map(c => ({...c, s: scores[c.id] || 0})).sort((a,b) => b.s - a.s)[0] 
        : categories[0];

      if (step === 'welcome') return (
        <div className="glass-card rounded-[3rem] p-12 sm:p-20 text-center text-reveal">
          <Logo />
          <p className="text-[12px] font-bold tracking-[0.4em] text-[#c5a059] mb-4 uppercase">Subconscious Insight Tool</p>
          <h1 className="text-3xl font-light tracking-tight text-slate-800 mb-8">ハッピーライフレインボー™</h1>
          <div className="w-12 h-[1px] bg-slate-300 mx-auto mb-10"></div>
          <p className="text-slate-500 leading-relaxed font-light text-sm mb-12 max-w-sm mx-auto">
            人生の8つの領域。その奥に眠るあなたの可能性と、<br/>
            未来を彩る虹の架け橋を解き明かします。
          </p>
          <button onClick={() => setStep('quiz')} className="w-full max-w-xs py-5 btn-luxury text-white rounded-full text-xs font-bold shadow-xl">
            JOURNEY BEGINS
          </button>
        </div>
      );

      if (step === 'quiz') return (
        <div className="glass-card rounded-[3rem] p-10 sm:p-16 text-reveal">
          <div className="flex justify-between items-center mb-10">
            <div>
              <p className="text-[10px] tracking-widest text-slate-400 font-bold mb-1 uppercase">{currentCat.name}</p>
              <h2 className="text-xl font-bold" style={{color: currentCat.color}}>{currentCat.jp}</h2>
            </div>
            <p className="text-xs font-mono text-slate-300">{qIdx + 1} / {totalQs}</p>
          </div>
          
          <div className="rainbow-progress mb-16">
            <div className="rainbow-progress-fill" style={{ width: `${((qIdx + 1) / totalQs) * 100}%`, backgroundColor: currentCat.color }}></div>
          </div>

          <h3 className="text-xl sm:text-2xl font-light leading-relaxed text-slate-700 mb-16 min-h-[120px]">
            {currentCat.questions[qIdx % 5]}
          </h3>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button onClick={() => handleAnswer(1)} className="py-5 bg-white/50 hover:bg-white rounded-2xl border border-white transition-all text-sm font-medium text-slate-600 shadow-sm">
              はい、当てはまる
            </button>
            <button onClick={() => handleAnswer(0)} className="py-5 bg-white/50 hover:bg-white rounded-2xl border border-white transition-all text-sm font-medium text-slate-600 shadow-sm">
              いいえ、今は違う
            </button>
          </div>
        </div>
      );

      if (step === 'result') return (
        <div className="glass-card rounded-[3rem] p-8 sm:p-16 text-reveal max-h-[90vh] overflow-y-auto custom-scrollbar">
          <div className="text-center mb-12">
            <p className="text-[10px] font-bold tracking-[0.4em] text-[#c5a059] mb-4 uppercase">Subconscious Report</p>
            <h2 className="text-3xl font-light text-slate-800">あなたの虹のメッセージ</h2>
          </div>

          {/* 重点分析セクション */}
          <div className="bg-white/80 rounded-[2.5rem] p-8 mb-8 border border-white shadow-sm">
            <div className="flex items-center gap-6 mb-6">
              <div className="w-1.5 h-16 rounded-full" style={{backgroundColor: topCat.color}}></div>
              <div>
                <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">{topCat.name}</p>
                <p className="text-3xl font-bold" style={{color: topCat.color}}>{topCat.jp}</p>
              </div>
            </div>
            <p className="text-slate-700 leading-loose text-sm font-bold mb-6 italic">「{topCat.hook}」</p>
            <div className="bg-slate-50/50 rounded-2xl p-6 border border-slate-100">
              <p className="text-[10px] font-bold text-[#c5a059] tracking-widest mb-2 uppercase">Your Next Step</p>
              <p className="text-slate-600 text-sm leading-relaxed">{topCat.firstStep}</p>
            </div>
          </div>

          {/* 潜在意識の抵抗・バイアスについての解説 */}
          <div className="bg-slate-50/80 rounded-[2.5rem] p-8 sm:p-10 mb-12 border border-slate-100">
            <h4 className="text-[11px] font-bold text-slate-400 tracking-[0.2em] mb-6 text-center uppercase">
              Message from Subconscious
            </h4>
            <p className="text-slate-600 text-sm leading-loose mb-6">
              診断結果に、ほんの少しの<b>「違和感」</b>を感じませんでしたか？<br/><br/>
              その感覚は、あなたの脳が現状を維持しようとしてかける「無意識のブレーキ（認知バイアス）」です。違和感がある時ほど、その裏側には、あなたがまだ手にしていない<b>新しい虹の色彩</b>が眠っています。
            </p>
            <div className="w-8 h-[1px] bg-slate-200 mx-auto mb-6"></div>
            <p className="text-slate-500 text-[13px] leading-loose italic">
              本当はもっと輝けるはずの領域を、もう一度自分に許可してあげてください。違和感の先に、あなただけの美しい虹が完成する瞬間が待っています。
            </p>
          </div>

          {/* 各領域のスコア一覧 */}
          <div className="space-y-4 mb-12">
            <p className="text-center text-[10px] font-bold text-slate-300 tracking-[0.3em] mb-6 uppercase">Balance Analysis</p>
            {categories.map(cat => {
              const score = scores[cat.id] || 0;
              return (
                <div key={cat.id} className="flex items-center justify-between px-6 py-4 bg-white/40 rounded-2xl">
                  <span className="text-xs font-bold text-slate-500 tracking-wider w-24">{cat.jp}</span>
                  <div className="flex-1 flex gap-1.5 justify-end">
                    {[0, 1, 2, 3, 4].map(i => (
                      <div key={i} className="w-8 h-1.5 rounded-full" style={{backgroundColor: score > i ? cat.color : '#f1f5f9'}}></div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>

          <div className="flex flex-col gap-4">
            <button className="w-full py-5 btn-luxury text-white rounded-full text-xs font-bold shadow-lg">
              無料カウンセリングで、虹を作りにいく
            </button>
            <button onClick={() => window.location.reload()} className="w-full py-5 text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase">
              Restart Journey
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
