<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハッピーライフレインボー™ 診断</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap');
        body {
            background-color: #fcfcfd;
            font-family: 'Noto Sans JP', sans-serif;
            color: #2d3748;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .rainbow-line {
            height: 4px;
            background: linear-gradient(to right, #FF7F7F, #FFBF7F, #facc15, #4ade80, #3b82f6, #8b5cf6);
            border-radius: 2px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div id="root" class="w-full max-w-lg"></div>

    <script type="text/babel">
        function App() {
            const [step, setStep] = React.useState('welcome');
            const [qIdx, setQIdx] = React.useState(0);
            const [scores, setScores] = React.useState({});

            const categories = [
                { id: 'mental', name: 'MENTAL', color: '#FF7F7F', questions: ["本当は変わりたいのに、「自分には無理かもしれない」と感じることがある。", "うまくいかない理由を、自分の性格や過去のせいにしてしまうことがある。"] },
                { id: 'health', name: 'HEALTH', color: '#FFBF7F', questions: ["自分の体調や疲れを後回しにして、無理を続けてしまうことがある。", "健康を整えたいと思っても、「忙しいから仕方ない」と諦めてしまう。"] },
                { id: 'work', name: 'WORK', color: '#facc15', questions: ["今の仕事や役割に違和感があっても、「これが現実だから」と我慢している。", "自分の本当にやりたい仕事を考えると、現実的ではない気がしてしまう。"] },
                { id: 'money', name: 'MONEY', color: '#4ade80', questions: ["お金を使うことに、どこか罪悪感や不安を感じることがある。", "自分がもっと豊かになっていい、とは心から思えないことがある。"] },
                { id: 'learning', name: 'LEARNING', color: '#3b82f6', questions: ["学びたい気持ちはあるのに、「今さら遅い」と感じることがある。", "新しいことを始める前に、失敗や継続できない自分を想像して止まってしまう。"] },
                { id: 'hobby', name: 'HOBBY', color: '#3b82f6', questions: ["好きなことをする時間に、どこか罪悪感を覚えることがある。", "趣味や楽しみは「余裕がある人のもの」だと思ってしまう。"] },
                { id: 'living', name: 'LIVING', color: '#8b5cf6', questions: ["本当は暮らし方を変えたいのに、「今の環境では難しい」と思っている。", "自分が心地よく過ごすことより、日々をこなすことを優先している。"] },
                { id: 'relationship', name: 'RELATIONSHIP', color: '#d946ef', questions: ["本音を言うと嫌われる、迷惑をかける、と思ってしまうことがある。", "人に頼るより、自分で抱え込んだ方が楽だと感じることがある。"] }
            ];

            const handleAnswer = (val) => {
                const catId = categories[Math.floor(qIdx / 2)].id;
                setScores(prev => ({ ...prev, [catId]: (prev[catId] || 0) + val }));
                if (qIdx < 15) setQIdx(qIdx + 1);
                else setStep('result');
            };

            if (step === 'welcome') return (
                <div className="glass-card rounded-3xl p-10 text-center animate-fade-in">
                    {/* ここにロゴ画像を表示 */}
                    <img src="logo.png" alt="Happy Life Rainbow" className="h-20 mx-auto mb-8 object-contain" />
                    
                    <h1 className="text-2xl font-bold tracking-tight text-gray-800 mb-4">潜在意識バイアス診断</h1>
                    <div className="rainbow-line mb-8 w-24 mx-auto"></div>
                    <p className="text-gray-500 leading-relaxed mb-10 text-sm">
                        あなたの心の奥底にある「ブレーキ」を可視化し、<br />
                        本来の軽やかさを取り戻すための第一歩です。
                    </p>
                    <button onClick={() => setStep('quiz')} className="w-full py-4 btn-gradient text-white rounded-2xl font-bold tracking-widest">
                        START
                    </button>
                </div>
            );

            if (step === 'quiz') {
                const current = categories[Math.floor(qIdx / 2)];
                return (
                    <div className="glass-card rounded-3xl p-10 animate-fade-in">
                        <div className="flex justify-between items-end mb-10">
                            <div>
                                <p className="text-[10px] font-bold tracking-[0.2em] text-gray-400 mb-1">CATEGORY</p>
                                <p className="text-lg font-bold" style={{color: current.color}}>{current.name}</p>
                            </div>
                            <p className="text-xs font-medium text-gray-300">{qIdx + 1} / 16</p>
                        </div>
                        <h2 className="text-xl font-medium leading-relaxed text-gray-800 mb-12 min-h-[80px]">
                            {current.questions[qIdx % 2]}
                        </h2>
                        <div className="grid gap-4">
                            <button onClick={() => handleAnswer(1)} className="py-4 rounded-xl border border-gray-100 hover:border-indigo-400 hover:bg-indigo-50/50 transition-all font-medium text-gray-600 text-sm">
                                はい
                            </button>
                            <button onClick={() => handleAnswer(0)} className="py-4 rounded-xl border border-gray-100 hover:border-indigo-400 hover:bg-indigo-50/50 transition-all font-medium text-gray-600 text-sm">
                                いいえ
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 'result') return (
                <div className="glass-card rounded-3xl p-10 animate-fade-in">
                    <h2 className="text-xl font-bold text-center mb-2">Diagnosis Result</h2>
                    <p className="text-xs text-center text-gray-400 mb-8 uppercase tracking-widest">診断結果</p>
                    <div className="space-y-4 mb-10">
                        {categories.map(cat => (
                            <div key={cat.id} className="flex items-center justify-between p-4 bg-gray-50/50 rounded-2xl">
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">{cat.name}</span>
                                <div className="flex gap-1">
                                    {[0, 1].map(i => (
                                        <div key={i} className={`w-8 h-2 rounded-full ${(scores[cat.id] || 0) > i ? 'opacity-100' : 'bg-gray-200'}`} style={{backgroundColor: (scores[cat.id] || 0) > i ? cat.color : ''}}></div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => window.location.reload()} className="w-full py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold text-sm">
                        RETRY
                    </button>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
