<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レインボーバランスファインド | Happy Life Rainbow™</title>

  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');

    :root {
      --mental: #FF9AA2;
      --health: #FFB347;
      --work: #FFD93D;
      --money: #6BCB77;
      --learning: #4ECDC4;
      --hobby: #7ED6DF;
      --living: #5DADE2;
      --relation: #C8A2C8;
      --ink: #243042;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
      background: #ffffff;
      overflow-x: hidden;
    }

    .aurora-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,154,162,.22), transparent 28%),
        radial-gradient(circle at 88% 16%, rgba(126,214,223,.23), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(107,203,119,.15), transparent 32%),
        linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
    }

    .glass-card {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 34px 82px rgba(31,41,55,.075);
    }

    .serif { font-family: 'Noto Serif JP', serif; font-weight: 600; }

    .brand-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      letter-spacing: .04em;
      line-height: 1.12;
      white-space: nowrap;
      color: transparent;
      background: linear-gradient(90deg, var(--mental), var(--health), var(--work), var(--money), var(--learning), var(--hobby), var(--living), var(--relation));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .brand-subcopy {
      font-family: 'Noto Serif JP', serif;
      font-weight: 500;
      letter-spacing: .07em;
    }

    .text-reveal { animation: textReveal .9s cubic-bezier(.16, 1, .3, 1) both; }

    @keyframes textReveal {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .btn-rainbow {
      background: linear-gradient(90deg, var(--mental), var(--health), var(--work), var(--money), var(--learning), var(--hobby), var(--living), var(--relation));
      transition: all .32s cubic-bezier(.16, 1, .3, 1);
      letter-spacing: .12em;
    }

    .btn-rainbow:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(236,64,122,.16);
      filter: saturate(1.04);
    }

    .soft-card {
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.92);
      box-shadow: 0 16px 36px rgba(31,41,55,.045);
    }

    .theme-card {
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78));
      border: 1px solid var(--soft-border, rgba(255,255,255,.92));
      box-shadow: 0 16px 38px rgba(31,41,55,.05), inset 0 1px 0 rgba(255,255,255,.9);
    }

    .rainbow-line {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mental), var(--health), var(--work), var(--money), var(--learning), var(--hobby), var(--living), var(--relation));
    }

    .hlr-icon svg {
      width: 44px;
      height: 44px;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }

    .hlr-icon:hover svg { transform: scale(1.06); }

    .cover-orbit {
      position: relative;
      width: min(78vw, 390px);
      height: min(78vw, 390px);
      margin: 0 auto;
    }

    .orbit-icon {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-145px) rotate(calc(-1 * var(--angle)));
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,.30);
      border: 1px solid rgba(255,255,255,.66);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(31,41,55,.045);
      transition: all .32s cubic-bezier(.16,1,.3,1);
    }

    .orbit-icon:hover {
      background: rgba(255,255,255,.52);
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-145px) rotate(calc(-1 * var(--angle))) scale(1.05);
    }

    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 999px; }

    #runtime-error {
      display: none;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 50;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.96);
      border: 1px solid #fecdd3;
      color: #9f1239;
      font-size: 12px;
      box-shadow: 0 14px 36px rgba(31,41,55,.12);
      white-space: pre-wrap;
    }

    @media (max-width: 520px) {
      body { align-items: flex-start; padding: 12px !important; }
      .glass-card { border-radius: 2rem !important; }
      .brand-title { font-size: 1.55rem; letter-spacing: .02em; }
      .cover-orbit { width: min(82vw, 310px); height: min(82vw, 310px); margin-bottom: 2rem; }
      .orbit-icon {
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-116px) rotate(calc(-1 * var(--angle)));
        width: 52px;
        height: 52px;
      }
      .orbit-icon .hlr-icon svg { width: 32px; height: 32px; }
      .orbit-icon:hover { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-116px) rotate(calc(-1 * var(--angle))) scale(1.03); }
    }

    @media (max-width: 380px) {
      .brand-title { font-size: 1.42rem; letter-spacing: .01em; }
      .cover-orbit { width: 290px; height: 290px; }
      .orbit-icon {
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-106px) rotate(calc(-1 * var(--angle)));
        width: 48px;
        height: 48px;
      }
      .orbit-icon:hover { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-106px) rotate(calc(-1 * var(--angle))) scale(1.03); }
    }
  </style>
</head>

      { id: 'work', name: 'WORK', jp: '仕事', color: colors.work, layer: '社会・価値発揮', role: '価値発揮の場。役割、キャリア、貢献、社会との接点を表します。', reportTitle: '仕事の中に自分らしさを戻すこと', action: '小さな選択の中で自分の感覚を優先する場面を増やすことで、仕事の中の心地よさが少しずつ広がっていきます。', questions: ['今の仕事や役割に対して、心の中にはどんな納得感がありますか？', '本当にやってみたい仕事を考えたとき、どんな声が内側に浮かびますか？', '仕事で評価されることと、自分らしくいることのバランスはどう感じますか？', '挑戦したいことを思い浮かべたとき、何が一番大きく見えますか？', '自分の強みや価値は、今の仕事でどのくらい自然に活かされていますか？'] },

    const categoryReports = {
      mental: 'メンタルの領域では、自分に対して少し厳しくなっている感覚があるかもしれません。本当はできていることもあるのに、足りない部分に意識が向きやすくなっている状態です。空でいうと、少し雲がかかって光が見えにくくなっているようなイメージです。',
      health: '健康の領域では、少し無理をしている感覚や、自分の回復を後回しにしている流れがあるようです。頑張れている一方で、休むタイミングが少しずれているのかもしれません。空でいうと、風が少し強く吹き続けているような状態です。',
      work: '仕事の領域では、どこかで違和感を感じながらも、そのまま進んでいる感覚があるかもしれません。本当はこうしたい、という気持ちが、少しずつ内側に見え始めている状態です。空でいうと、雲のすき間から光が差し始めているようなイメージです。',
      money: 'お金の領域では、安心したい気持ちと、もう少し広げていきたい気持ちが、同時にあるように見えます。どちらか一方ではなく、その両方を感じている状態です。空でいうと、晴れと雲が重なっているような感覚に近いかもしれません。',
      learning: '学びの領域では、成長したい気持ちはあるものの、一歩を踏み出すことに少し迷いがあるかもしれません。やってみたい気持ちと、うまくできるかどうかの不安が、同時に存在している状態です。空でいうと、少しずつ光が広がり始めているようなイメージです。',
      hobby: '趣味の領域では、楽しみたい気持ちはあるものの、少し後回しになっている感覚があるかもしれません。やるべきことを優先する中で、自分のワクワクが少し遠くなっている状態です。空でいうと、やわらかい光が少しずつ戻ってきているようなイメージです。',
      living: '暮らしの領域では、少しだけ整えきれていない感覚や、後回しになっている部分があるようです。大きな問題ではないけれど、どこか落ち着ききらない感覚につながっているかもしれません。空でいうと、うっすら雲がかかっているような状態です。',
      relation: '人間関係の領域では、相手を大切にする気持ちが強い一方で、自分の気持ちを少し後回しにしているかもしれません。やさしさがあるからこそ、バランスが少しだけ偏っている状態です。空でいうと、やわらかい光があるけれど、少し控えめに広がっているようなイメージです。'
    };

    function getSkyState(total) {
      if (total >= 26) return { title: '光が少し見えにくくなっている空模様', message: 'いくつかの領域で、気持ちの重なりや疲れが出ているようです。無理に晴らそうとしなくても大丈夫です。まずは、いま感じていることをそのまま受け止めるところから、少しずつ空は整っていきます。' };
      if (total >= 16) return { title: '晴れと雲が重なっている空模様', message: '前向きな気持ちと、少し立ち止まりたい気持ちが同時にあるようです。このゆらぎは、次の方向を見つけるための自然なサインです。焦らず見つめていくことで、必要な光が少しずつ見えてきます。' };
      return { title: '光がやわらかく広がっている空模様', message: '全体的に、今のあなたを支える土台が穏やかに整っています。ここからは、無理に変えるよりも、心地よい感覚を大切にしながら、さらに自分らしい方向へ広げていけそうです。' };
    }

    function getMoyamoyaLevel(score) {
      if (score >= 5) return { label: 'もやが濃い状態', tone: 'ここには、今のあなたがいちばん丁寧にほどきたい深いサインが集まっています。', badge: 'bg-rose-50 text-rose-500 border-rose-100' };
      if (score >= 4) return { label: '少し詰まり気味', tone: 'この領域では、気づかないうちに力が入りすぎている可能性があります。', badge: 'bg-pink-50 text-pink-500 border-pink-100' };
      if (score >= 3) return { label: 'ややゆらぎ', tone: '小さな違和感が、そろそろ言葉にしてほしいサインとして現れています。', badge: 'bg-amber-50 text-amber-600 border-amber-100' };
      if (score >= 1) return { label: 'ほぼクリア', tone: '大きな詰まりは少なく、少し整えるだけでさらに軽やかになりそうです。', badge: 'bg-sky-50 text-sky-500 border-sky-100' };
      return { label: 'とてもクリア', tone: 'この領域は、今のあなたを支える安定した光として働いています。', badge: 'bg-emerald-50 text-emerald-500 border-emerald-100' };
    }

    function getPersonalCategoryReport(cat) {
      if (cat.score >= 4) return categoryReports[cat.id] + ' まずは変えようとするよりも、この感覚に気づけたことを大切にしてみてください。';
      if (cat.score >= 2) return categoryReports[cat.id] + ' 小さく整えていくことで、この領域の見え方は少しずつやさしく変わっていきます。';
      return cat.jp + 'の領域は、今のあなたを支える安定した光として働いています。大きなもやもやは少なく、自分らしい感覚を比較的自然に保てている状態です。ここを起点に、他の領域にも心地よさを広げていけそうです。';
    }

    const oppositePairs = { mental: 'learning', learning: 'mental', health: 'hobby', hobby: 'health', work: 'living', living: 'work', money: 'relation', relation: 'money' };
    const pairThemes = { 'learning-mental': '内面と成長の対話', 'health-hobby': 'エネルギーと楽しさの循環', 'living-work': '役割と日常のバランス', 'money-relation': '価値とつながりの関係性' };

    function getCategory(id) { return categories.find(function(c) { return c.id === id; }); }
    function scoreToPercent(score) { return Math.round((score / 5) * 100); }

    function analyze(answers) {
      const scored = categories.map(function(cat, idx) {
        const score = answers.slice(idx * 5, idx * 5 + 5).reduce(function(a, b) { return a + b; }, 0);
        return Object.assign({}, cat, { score, percent: scoreToPercent(score) });
      }).sort(function(a, b) { return b.score - a.score; });

      const top = scored[0];
      const second = scored[1];
      const third = scored[2];
      const total = scored.reduce(function(sum, c) { return sum + c.score; }, 0);
      const opposite = getCategory(oppositePairs[top.id]) || top;
      const pairKey = [top.id, opposite.id].sort().join('-');
      const pairTheme = pairThemes[pairKey] || '内側と外側のバランス';
      const skyState = getSkyState(total);

      let totalLabel = '自分への見え方をやさしく整えること';
      let totalMessage = '全体を通して、少しだけ自分に厳しくなりやすい傾向が見えています。でもそれは、もっとよくなりたいという前向きなエネルギーの裏返しでもあります。まずは、できていない部分ではなく、すでにできていることや持っているものに目を向ける時間を、ほんの少し増やしてみてください。';
      if (total >= 26) {
        totalLabel = '心の余白を取り戻し、人生の軸を整えること';
        totalMessage = '複数のカテゴリーに、今のあなたからの大切なサインが出ています。これは悪い結果ではなく、これまで頑張ってきた自分を一度ゆっくり見つめ直すタイミングです。答えを急がず、心の余白を取り戻すことで、本当に大切にしたい価値観が少しずつ見えやすくなります。';
      } else if (total >= 16) {
        totalLabel = '小さな違和感を言葉にして、流れを整えること';
        totalMessage = 'いくつかの領域で、エネルギーのゆらぎが見えています。大きく変えようとしなくても大丈夫です。まずは小さな違和感を言葉にすることから始めると、隣り合うカテゴリーにもやさしい連鎖が広がっていきます。';
      } else if (total <= 7) {
        totalLabel = '安定した虹を、未来へ軽やかに広げること';
        totalMessage = '全体のバランスは比較的クリアで、今のあなたを支える土台が整っています。ここからは整えるだけでなく、理想のビジョンに向けて、好き・挑戦・つながりを少しずつ広げていくフェーズです。';
      }
      return { scored, top, second, third, total, opposite, pairTheme, totalLabel, totalMessage, skyState };
    }

    function runSelfTests() {
      console.assert(categories.length === 8, 'categories should have 8 items');
      console.assert(categories.every(function(c) { return c.questions.length === 5; }), 'each category should have 5 questions');
      console.assert(categories.every(function(c) { return answerChoices[c.id] && answerChoices[c.id].length === 5; }), 'each category should have 5 answer choice pairs');
      console.assert(analyze(new Array(40).fill(0)).total === 0, 'allNo total should be 0');
      console.assert(analyze(new Array(40).fill(1)).total === 40, 'allYes total should be 40');
      console.assert(scoreToPercent(5) === 100, 'score 5 should be 100%');
    }
    runSelfTests();

    function LogoMark() {
      const sources = ['./logo.png', 'logo.png', '/logo.png', '/mnt/data/logo.png'];
      const [sourceIndex, setSourceIndex] = useState(0);
      const src = sources[sourceIndex];
      function handleLogoError() { if (sourceIndex < sources.length - 1) setSourceIndex(sourceIndex + 1); }
      return <img src={src} alt="Happy Life Rainbow Logo" className="w-full h-full object-contain opacity-95" onError={handleLogoError} />;
    }

    function CategoryCircleChart({ scored }) {
      const ordered = categories.map(function(c) {
        const found = scored.find(function(s) { return s.id === c.id; });
        return Object.assign({}, c, { score: found ? found.score : 0, percent: found ? found.percent : 0 });
      });
      const center = 190;
      const chartR = 92;
      const iconR = 148;
      const radarMaxR = 62;
      const angleOffset = -90;
      function point(index, radius) {
        const angle = (angleOffset + index * 45) * Math.PI / 180;
        return { x: center + Math.cos(angle) * radius, y: center + Math.sin(angle) * radius };
      }
      const radarPoints = ordered.map(function(cat, i) {
        const p = point(i, 20 + (cat.score / 5) * radarMaxR);
        return p.x + ',' + p.y;
      }).join(' ');
      return (
        <div className="mb-10">
          <div className="text-center mb-6">
            <p className="text-xs font-bold text-slate-400 tracking-[0.25em] mb-3">INNER RAINBOW MAP</p>
            <p className="text-sm text-slate-500 leading-relaxed">ゲージが高い領域ほど、まだ言葉になっていない“もやもや”のサインです。</p>
          </div>
          <div className="relative w-full max-w-[430px] mx-auto">
            <svg viewBox="0 0 380 380" className="w-full h-auto overflow-visible" aria-label="Inner Rainbow Map">
              <defs>
                <linearGradient id="rainbowStroke" x1="70" y1="70" x2="310" y2="310" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stopColor="#FF9AA2" />
                  <stop offset="15%" stopColor="#FFB347" />
                  <stop offset="30%" stopColor="#FFD93D" />
                  <stop offset="45%" stopColor="#6BCB77" />
                  <stop offset="60%" stopColor="#4ECDC4" />
                  <stop offset="75%" stopColor="#5DADE2" />
                  <stop offset="100%" stopColor="#C8A2C8" />
                </linearGradient>
                <radialGradient id="softCenter" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="rgba(255,255,255,.92)" />
                  <stop offset="100%" stopColor="rgba(255,255,255,.22)" />
                </radialGradient>
              </defs>
              <circle cx={center} cy={center} r={chartR + 24} fill="url(#softCenter)" stroke="url(#rainbowStroke)" strokeWidth="1.5" opacity=".92" />
              <circle cx={center} cy={center} r={chartR} fill="none" stroke="url(#rainbowStroke)" strokeWidth="1.2" opacity=".50" />
              <circle cx={center} cy={center} r={chartR * .66} fill="none" stroke="#e8edf3" strokeWidth="1" opacity=".75" />
              <circle cx={center} cy={center} r={chartR * .33} fill="none" stroke="#e8edf3" strokeWidth="1" opacity=".75" />
              {[[0,4],[1,5],[2,6],[3,7]].map(function(pair, i) {
                const a = point(pair[0], chartR + 16);
                const b = point(pair[1], chartR + 16);
                return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#e2e8f0" strokeWidth="1" opacity=".55" />;
              })}
              <polygon points={radarPoints} fill="rgba(255,154,162,.13)" stroke="url(#rainbowStroke)" strokeWidth="2" opacity=".95" />
              {ordered.map(function(cat, i) {
                const p = point(i, iconR);
                const dot = point(i, 20 + (cat.score / 5) * radarMaxR);
                return (
                  <g key={cat.id}>
                    <line x1={center} y1={center} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1" opacity=".35" />
                    <circle cx={dot.x} cy={dot.y} r="4" fill={cat.color} opacity=".9" />
                    <circle cx={p.x} cy={p.y} r="30" fill="rgba(255,255,255,.68)" stroke="rgba(255,255,255,.9)" strokeWidth="1.2" />
                    <g transform={'translate(' + (p.x - 22) + ',' + (p.y - 22) + ') scale(0.1467)'}>
                      <IconGlyph id={cat.id} color={cat.color} />
                    </g>
                  </g>
                );
              })}
            </svg>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState('cover');
      const [answers, setAnswers] = useState([]);
      const qIdx = answers.length;
      const catIdx = Math.floor(qIdx / 5);
      const currentCat = categories[catIdx] || categories[0];
      const currentQuestionIndex = qIdx % 5;
      const currentChoices = answerChoices[currentCat.id][currentQuestionIndex] || ['', ''];
      const progress = Math.round((answers.length / 40) * 100);

      function handleAnswer(value) {
        const nextAnswers = answers.concat(value);
        setAnswers(nextAnswers);
        if (nextAnswers.length >= 40) setStep('result');
      }

      function reset() {
        setAnswers([]);
        setStep('cover');
      }

      if (step === 'cover') {
        return (
          <main className="glass-card rounded-[2rem] sm:rounded-[3rem] p-5 sm:p-12 text-center text-reveal relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full rainbow-line"></div>
            <div className="pt-7 sm:pt-10 pb-1">
              <p className="text-[10px] sm:text-xs font-bold tracking-[0.28em] sm:tracking-[0.36em] text-slate-400 uppercase mb-4 sm:mb-6">Happy Life Rainbow™</p>
              <h1 className="brand-title text-[1.55rem] sm:text-5xl mb-5 sm:mb-6">レインボーバランスファインド</h1>
              <p className="brand-subcopy text-[13px] sm:text-base text-slate-500 leading-loose mb-4 italic">もやもやの奥にある、あなたの虹を見つける</p>
              <p className="text-[13px] sm:text-base text-slate-500 leading-loose mb-6 sm:mb-8">8つの視点をめぐりながら、今の自分の内側にやさしく気づいていく時間。<br />答えは外ではなく、すでにあなたの中にあります。</p>
            </div>
            <section className="cover-orbit mb-8 sm:mb-10" aria-label="8 categories">
              <div className="absolute inset-[28%] rounded-full border border-white/50 bg-white/20 backdrop-blur-sm"></div>
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="w-28 h-28 sm:w-44 sm:h-44 rounded-full bg-white/46 border border-white/70 backdrop-blur-xl shadow-sm flex items-center justify-center p-5 sm:p-8">
                  <LogoMark />
                </div>
              </div>
              {categories.map(function(cat, i) {
                return <div key={cat.id} className="orbit-icon" style={{ '--angle': (i * 45) + 'deg' }} title={cat.jp}><CategoryIcon id={cat.id} color={cat.color} size={40} /></div>;
              })}
            </section>
            <button onClick={() => setStep('quiz')} className="btn-rainbow text-white font-black rounded-full px-9 sm:px-10 py-4 shadow-lg text-sm sm:text-base w-full sm:w-auto max-w-[280px]">虹を見つけにいく</button>
            <p className="mt-5 text-xs text-slate-400">正解を探す時間ではなく、すでにある感覚に気づくための時間です。</p>
          </main>
        );
      }

      if (step === 'quiz') {
        return (
          <main className="glass-card rounded-[2rem] sm:rounded-[3rem] p-5 sm:p-12 text-reveal min-h-[calc(100vh-24px)] sm:min-h-[620px] flex flex-col relative overflow-hidden">
            <div className="absolute top-0 left-0 h-1 bg-gradient-to-r from-pink-300 via-yellow-300 to-sky-300 transition-all" style={{ width: progress + '%' }}></div>
            <header className="mb-8 sm:mb-12 pt-4">
              <div className="flex items-center justify-between gap-4 mb-8">
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl sm:rounded-3xl theme-card flex items-center justify-center" style={{ borderColor: hexToRgba(currentCat.color, .22), background: 'linear-gradient(180deg,' + hexToRgba(currentCat.color, .08) + ',rgba(255,255,255,.84) 44%)' }}>
                    <CategoryIcon id={currentCat.id} color={currentCat.color} size={42} />
                  </div>
                  <div>
                    <p className="text-xs font-bold tracking-[0.25em] text-slate-400">{currentCat.name}</p>
                    <h2 className="text-xl sm:text-2xl font-black" style={{ color: currentCat.color }}>{currentCat.jp}</h2>
                  </div>
                </div>
                <p className="text-xs font-bold text-slate-300">{answers.length + 1} / 40</p>
              </div>
              <div className="theme-card rounded-[1.6rem] sm:rounded-[2rem] p-4 sm:p-5" style={{ borderColor: hexToRgba(currentCat.color, .20), background: 'linear-gradient(180deg,' + hexToRgba(currentCat.color, .07) + ',rgba(255,255,255,.84) 46%)' }}>
                <p className="text-xs font-bold tracking-[0.16em] mb-2" style={{ color: currentCat.color }}>この領域のテーマ</p>
                <p className="text-sm text-slate-600 leading-relaxed">{currentCat.role}</p>
              </div>
            </header>
            <div className="flex-1 flex flex-col justify-center">
              <p className="text-xs font-bold tracking-[0.28em] text-slate-400 mb-6">QUESTION</p>
              <h3 className="text-lg sm:text-2xl font-light leading-relaxed text-slate-700 mb-8 sm:mb-12 min-h-[96px] sm:min-h-[110px]">{currentCat.questions[currentQuestionIndex]}</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <button onClick={() => handleAnswer(1)} className="py-4 sm:py-5 px-5 bg-white/72 hover:bg-white rounded-2xl border border-white transition-all text-sm sm:text-base font-bold text-slate-600 shadow-sm min-h-[64px]">{currentChoices[0]}</button>
                <button onClick={() => handleAnswer(0)} className="py-4 sm:py-5 px-5 bg-white/72 hover:bg-white rounded-2xl border border-white transition-all text-sm sm:text-base font-bold text-slate-600 shadow-sm min-h-[64px]">{currentChoices[1]}</button>
              </div>
            </div>
          </main>
        );
      }

      const insight = analyze(answers);

      return (
        <main className="glass-card rounded-[2rem] sm:rounded-[3rem] p-5 sm:p-12 text-reveal max-h-[calc(100vh-24px)] sm:max-h-[92vh] overflow-y-auto custom-scrollbar relative">
          <div className="absolute top-0 left-0 w-full rainbow-line"></div>
          <header className="text-center mb-10 sm:mb-14 pt-6">
            <p className="text-xs font-bold tracking-[0.32em] text-slate-400 uppercase mb-4">Happy Life Rainbow™</p>
            <p className="serif text-xl sm:text-2xl text-slate-700 tracking-[0.10em] mb-3">レインボーバランスファインド</p>
            <h2 className="text-3xl sm:text-6xl font-light tracking-[0.12em] sm:tracking-[0.16em] text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-yellow-300 to-sky-300 uppercase">Insight Report</h2>
            <p className="serif mt-5 text-sm tracking-[0.16em] sm:tracking-[0.22em] text-slate-400 italic">もやもやの奥に、いま見えてきた虹。</p>
          </header>

          <section className="soft-card rounded-[2rem] sm:rounded-[2.5rem] p-5 sm:p-10 mb-8 sm:mb-10 text-center">
            <p className="text-sm sm:text-base text-slate-600 leading-loose">あなたが選んだ感覚から、いまの内側にある虹のかけらが少しずつ見えてきました。<br />これは、いまのあなたの<strong className="font-black text-slate-700">レインボーバランス</strong>をやさしく見つめるための時間です。<br className="hidden sm:block" />良い・悪いを判断するものではなく、すでにある答えに気づいていくためのものです。</p>
          </section>

          <CategoryCircleChart scored={insight.scored} />

          <section className="soft-card rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-10 mb-8">
            <p className="text-xs font-bold tracking-[0.25em] text-slate-400 mb-4">いま見えてきた虹のかけら</p>
            <h3 className="text-2xl sm:text-3xl font-black text-slate-800 mb-5">{insight.totalLabel}</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base">{insight.totalMessage}</p>
          </section>

          <section className="rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-10 mb-8 sm:mb-10 bg-gradient-to-br from-sky-50/80 via-white/78 to-pink-50/70 border border-white/90 shadow-sm">
            <p className="text-xs font-bold tracking-[0.25em] text-slate-400 mb-4">いまの心の空模様</p>
            <h3 className="serif text-xl sm:text-3xl text-slate-800 mb-5 leading-relaxed">{insight.skyState.title}</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base">{insight.skyState.message}</p>
          </section>

          <section className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
            {[insight.top, insight.second, insight.third].map(function(cat, index) {
              const level = getMoyamoyaLevel(cat.score);
              return (
                <div key={cat.id} className="theme-card rounded-[1.8rem] sm:rounded-[2rem] p-5 sm:p-6" style={{ borderColor: hexToRgba(cat.color, .22), background: 'linear-gradient(180deg,' + hexToRgba(cat.color, .07) + ',rgba(255,255,255,.84) 46%)' }}>
                  <div className="flex items-center justify-between mb-4">
                    <CategoryIcon id={cat.id} color={cat.color} size={38} />
                    <span className="text-xs font-black text-slate-300">0{index + 1}</span>
                  </div>
                  <h4 className="font-black text-lg mb-1" style={{ color: cat.color }}>{cat.jp}</h4>
                  <p className="text-xs text-slate-400 mb-3">{cat.layer}</p>
                  <span className={'inline-block text-[10px] font-bold border rounded-full px-3 py-1 mb-4 ' + level.badge}>もやもや指数 {cat.percent}% / {level.label}</span>
                  <p className="text-xs sm:text-sm text-slate-600 leading-relaxed">{level.tone}</p>
                </div>
              );
            })}
          </section>

          <section className="space-y-5 mb-10">
            {insight.scored.map(function(cat) {
              const level = getMoyamoyaLevel(cat.score);
              return (
                <article key={cat.id} className="theme-card rounded-[1.8rem] sm:rounded-[2.2rem] p-5 sm:p-8" style={{ borderColor: hexToRgba(cat.color, .22), background: 'linear-gradient(180deg,' + hexToRgba(cat.color, .06) + ',rgba(255,255,255,.84) 44%)' }}>
                  <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-5">
                    <div className="flex items-center gap-4">
                      <div className="w-14 h-14 rounded-2xl bg-white/54 border border-white/70 flex items-center justify-center"><CategoryIcon id={cat.id} color={cat.color} size={34} /></div>
                      <div>
                        <p className="text-xs font-bold tracking-[0.24em] text-slate-400">{cat.name}</p>
                        <h4 className="text-xl font-black" style={{ color: cat.color }}>{cat.jp}</h4>
                      </div>
                    </div>
                    <span className={'self-start sm:self-center inline-block text-[11px] font-bold border rounded-full px-3 py-1 ' + level.badge}>もやもや指数 {cat.percent}% / {level.label}</span>
                  </div>
                  <h5 className="serif text-lg sm:text-xl text-slate-800 mb-4">{cat.reportTitle}</h5>
                  <p className="text-sm sm:text-base text-slate-600 leading-loose mb-4">{getPersonalCategoryReport(cat)}</p>
                  <p className="text-sm sm:text-base text-slate-600 leading-loose">ここから少しずつ、{cat.action}</p>
                </article>
              );
            })}
          </section>

          <section className="soft-card rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-10 mb-8 sm:mb-10">
            <p className="text-xs font-bold tracking-[0.25em] text-slate-400 mb-4">RAINBOW CONNECTION</p>
            <h3 className="text-2xl font-black text-slate-800 mb-5">{insight.pairTheme}</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base">特に「{insight.top.jp}」と、その向かい側にある「{insight.opposite.jp}」の関係性には、今のあなたを整えるヒントがあります。ひとつの領域だけを変えようとせず、つながりとして眺めることで、心の虹はより自然に整っていきます。</p>
          </section>

          <section className="text-center rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-10 bg-gradient-to-r from-pink-50/70 via-yellow-50/70 to-sky-50/70 border border-white/80 mb-8">
            <p className="text-xs font-bold tracking-[0.25em] text-slate-400 mb-4">レインボーバランスファインド</p>
            <p className="serif text-xl sm:text-2xl text-slate-700 leading-loose mb-5">もやもやの奥には、すでにあなたの虹があります。</p>
            <p className="text-sm text-slate-500 leading-loose">いま感じている違和感や揺らぎは、あなたの内側にある大切なサインです。<br />答えは外から与えられるものではなく、少しずつ見えてくるもの。<br />心に虹のかかる毎日を。<br />ここから、あなたのペースで見つけていきましょう。</p>
            <div className="mt-10 pt-6 border-t border-white/60">
              <p className="serif text-lg sm:text-xl text-slate-600 italic text-center">この虹は、これからどう広がっていきそうですか？</p>
            </div>
          </section>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button onClick={reset} className="py-4 rounded-full bg-white/72 hover:bg-white border border-white text-slate-500 font-bold transition-all">もう一度見つけにいく</button>
            <a href={bookingUrl} className="btn-rainbow text-center py-4 rounded-full text-white font-black shadow-lg">一緒に虹を見つける</a>
          </div>
        </main>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
