<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Life Rainbow™ | 心の虹バランスチェック</title>

  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');

    :root {
      --mental: #FF9AA2;
      --health: #FFB347;
      --work: #FFD93D;
      --money: #6BCB77;
      --learning: #4ECDC4;
      --hobby: #7ED6DF;
      --living: #5DADE2;
      --relation: #C8A2C8;
      --ink: #243042;
      --gold: #c5a059;
      --rose: #ec407a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
      background: #ffffff;
      overflow-x: hidden;
    }

    .aurora-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,154,162,.20), transparent 28%),
        radial-gradient(circle at 88% 16%, rgba(126,214,223,.22), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(107,203,119,.14), transparent 32%),
        linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
    }

    .glass-card {
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 38px 90px rgba(31,41,55,.075);
    }

    .serif { font-family: 'Noto Serif JP', serif; }

    .text-reveal { animation: textReveal 1.1s cubic-bezier(.16, 1, .3, 1) both; }

    @keyframes textReveal {
      from { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .btn-rainbow {
      background: linear-gradient(90deg, var(--mental), var(--health), var(--work), var(--money), var(--learning), var(--hobby), var(--living), var(--relation));
      transition: all .35s cubic-bezier(.16, 1, .3, 1);
      letter-spacing: .12em;
    }

    .btn-rainbow:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(236,64,122,.18);
      filter: saturate(1.04);
    }

    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 999px; }

    .soft-card {
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(255,255,255,.92);
      box-shadow: 0 16px 36px rgba(31,41,55,.045);
    }

    .theme-card {
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--c) 9%, transparent), rgba(255,255,255,.84) 42%),
        rgba(255,255,255,.84);
      border: 1px solid color-mix(in srgb, var(--c) 22%, rgba(255,255,255,.9));
      box-shadow:
        0 16px 38px color-mix(in srgb, var(--c) 12%, rgba(31,41,55,.045)),
        inset 0 1px 0 rgba(255,255,255,.9);
    }

    .rainbow-line {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mental), var(--health), var(--work), var(--money), var(--learning), var(--hobby), var(--living), var(--relation));
    }

    .hlr-icon svg {
      width: 44px;
      height: 44px;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }

    .hlr-icon:hover svg { transform: scale(1.08); }

    .cover-orbit {
      position: relative;
      width: min(78vw, 390px);
      height: min(78vw, 390px);
      margin: 0 auto;
    }

    .orbit-icon {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-145px) rotate(calc(-1 * var(--angle)));
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,.26);
      border: 1px solid rgba(255,255,255,.64);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(31,41,55,.045);
      transition: all .35s cubic-bezier(.16,1,.3,1);
    }

    .orbit-icon:hover {
      background: color-mix(in srgb, var(--c) 12%, rgba(255,255,255,.56));
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-145px) rotate(calc(-1 * var(--angle))) scale(1.06);
    }

    @media (max-width: 520px) {
      .orbit-icon { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-118px) rotate(calc(-1 * var(--angle))); width: 58px; height: 58px; }
      .orbit-icon:hover { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-118px) rotate(calc(-1 * var(--angle))) scale(1.05); }
    }
  </style>
</head>

      ],
      hobby: [
        { yes: '楽しみを後回しにしている', no: '楽しみを感じられている' },
        { yes: 'どこか遠慮してしまう', no: '素直に楽しめる' },
        { yes: 'やるべきことを優先してしまう', no: '好きな時間も大切にできる' },
        { yes: '少し罪悪感がある', no: '安心して楽しめる' },
        { yes: 'ワクワクが眠っている', no: '今も動いている感覚' }
      ],
      living: [
        { yes: '落ち着かない感覚がある', no: 'ほっとできる感覚がある' },
        { yes: '余白が足りない感覚', no: 'ゆとりを感じられる' },
        { yes: '整えたい気持ちはある', no: 'すでに心地よい' },
        { yes: '安心できる場所が少ない', no: '安心できる場所がある' },
        { yes: 'どこから整えればいいか迷う', no: '整えたい場所が見えている' }
      ],
      relation: [
        { yes: '本音を抑えてしまう感覚', no: '自然に伝えられる感覚' },
        { yes: '自分で抱えたくなる', no: '人に頼れる感覚' },
        { yes: '相手を優先しがち', no: '自分も大切にできている' },
        { yes: 'お願いや断るのがこわい', no: '必要な時に伝えられる' },
        { yes: '距離感に迷う', no: '心地よい距離がある' }
      ]
    };

    const oppositePairs = { mental: 'learning', learning: 'mental', health: 'hobby', hobby: 'health', work: 'living', living: 'work', money: 'relation', relation: 'money' };
    const adjacentNext = { mental: 'health', health: 'work', work: 'money', money: 'learning', learning: 'hobby', hobby: 'living', living: 'relation', relation: 'mental' };
    const pairThemes = { 'mental-learning': '内面と成長の対話', 'health-hobby': 'エネルギーと楽しさの循環', 'work-living': '役割と日常のバランス', 'money-relation': '価値とつながりの関係性' };

    function getCategory(id) { return categories.find(function(c) { return c.id === id; }); }

    function getMoyamoyaLevel(score) {
      if (score >= 5) return { label: 'もやが濃い状態', tone: 'ここには、今のあなたがいちばん丁寧にほどきたい深いサインが集まっています。', badge: 'bg-rose-50 text-rose-500 border-rose-100' };
      if (score >= 4) return { label: '少し詰まり気味', tone: 'この領域では、気づかないうちに力が入りすぎている可能性があります。', badge: 'bg-pink-50 text-pink-500 border-pink-100' };
      if (score >= 3) return { label: 'ややゆらぎ', tone: '小さな違和感が、そろそろ言葉にしてほしいサインとして現れています。', badge: 'bg-amber-50 text-amber-600 border-amber-100' };
      if (score >= 1) return { label: 'ほぼクリア', tone: '大きな詰まりは少なく、少し整えるだけでさらに軽やかになりそうです。', badge: 'bg-sky-50 text-sky-500 border-sky-100' };
      return { label: 'とてもクリア', tone: 'この領域は、今のあなたを支える安定した光として働いています。', badge: 'bg-emerald-50 text-emerald-500 border-emerald-100' };
    }

    function scoreToPercent(score) { return Math.round((score / 5) * 100); }

    function analyze(answers) {
      const scored = categories.map(function(cat, idx) {
        const score = answers.slice(idx * 5, idx * 5 + 5).reduce(function(a, b) { return a + b; }, 0);
        return Object.assign({}, cat, { score, percent: scoreToPercent(score) });
      }).sort(function(a, b) { return b.score - a.score; });

      const top = scored[0];
      const second = scored[1];
      const third = scored[2];
      const total = scored.reduce(function(sum, c) { return sum + c.score; }, 0);
      const opposite = getCategory(oppositePairs[top.id]);
      const next = getCategory(adjacentNext[top.id]);
      const pairKey = [top.id, opposite.id].sort().join('-');
      const pairTheme = pairThemes[pairKey] || '内側と外側のバランス';

      let totalLabel = '自分への見え方をやさしく整えること';
      let totalMessage = '全体を通して、少しだけ自分に厳しくなりやすい傾向が見えています。でもそれは、もっとよくなりたいという前向きなエネルギーの裏返しでもあります。まずは、できていない部分ではなく、すでにできていることや持っているものに目を向ける時間を、ほんの少し増やしてみてください。';

      if (total >= 26) {
        totalLabel = '心の余白を取り戻し、人生の軸を整えること';
        totalMessage = '複数のカテゴリーに、今のあなたからの大切なサインが出ています。これは悪い結果ではなく、これまで頑張ってきた自分を一度ゆっくり見つめ直すタイミングです。答えを急がず、心の余白を取り戻すことで、本当に大切にしたい価値観が少しずつ見えやすくなります。';
      } else if (total >= 16) {
        totalLabel = '小さな違和感を言葉にして、流れを整えること';
        totalMessage = 'いくつかの領域で、エネルギーのゆらぎが見えています。大きく変えようとしなくても大丈夫です。まずは小さな違和感を言葉にすることから始めると、隣り合うカテゴリーにもやさしい連鎖が広がっていきます。';
      } else if (total <= 7) {
        totalLabel = '安定した虹を、未来へ軽やかに広げること';
        totalMessage = '全体のバランスは比較的クリアで、今のあなたを支える土台が整っています。ここからは整えるだけでなく、理想のビジョンに向けて、好き・挑戦・つながりを少しずつ広げていくフェーズです。';
      }

      return { scored, top, second, third, total, opposite, next, pairTheme, totalLabel, totalMessage };
    }

    function CategoryCircleChart({ scored }) {
      const ordered = categories.map(function(c) {
        const found = scored.find(function(s) { return s.id === c.id; });
        return Object.assign({}, c, { score: found ? found.score : 0, percent: found ? found.percent : 0 });
      });

      const center = 190;
      const chartR = 92;
      const iconR = 148;
      const radarMaxR = 62;
      const angleOffset = -90;

      function point(index, radius) {
        const angle = (angleOffset + index * 45) * Math.PI / 180;
        return { x: center + Math.cos(angle) * radius, y: center + Math.sin(angle) * radius };
      }

      const radarPoints = ordered.map(function(cat, i) {
        const r = 20 + (cat.score / 5) * radarMaxR;
        const p = point(i, r);
        return p.x + ',' + p.y;
      }).join(' ');

      const oppositeLines = [[0,4],[1,5],[2,6],[3,7]];

      return (
        <div className="mb-10">
          <div className="text-center mb-6">
            <p className="text-xs font-bold text-slate-400 tracking-[0.25em] mb-3">INNER RAINBOW MAP</p>
            <p className="text-sm text-slate-500 leading-relaxed">ゲージが高い領域ほど、まだ言葉になっていない“もやもや”のサインです。</p>
          </div>

          <div className="relative w-full max-w-[430px] mx-auto">
            <svg viewBox="0 0 380 380" className="w-full h-auto overflow-visible" aria-label="Inner Rainbow Map">
              <defs>
                <linearGradient id="rainbowStroke" x1="70" y1="70" x2="310" y2="310" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stopColor="#FF9AA2" />
                  <stop offset="15%" stopColor="#FFB347" />
                  <stop offset="30%" stopColor="#FFD93D" />
                  <stop offset="45%" stopColor="#6BCB77" />
                  <stop offset="60%" stopColor="#4ECDC4" />
                  <stop offset="75%" stopColor="#5DADE2" />
                  <stop offset="100%" stopColor="#C8A2C8" />
                </linearGradient>
                <radialGradient id="softCenter" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="rgba(255,255,255,.92)" />
                  <stop offset="100%" stopColor="rgba(255,255,255,.22)" />
                </radialGradient>
              </defs>

              <circle cx={center} cy={center} r={chartR + 24} fill="url(#softCenter)" stroke="url(#rainbowStroke)" strokeWidth="1.5" opacity=".92" />
              <circle cx={center} cy={center} r={chartR} fill="none" stroke="url(#rainbowStroke)" strokeWidth="1.2" opacity=".50" />
              <circle cx={center} cy={center} r={chartR * .66} fill="none" stroke="#e8edf3" strokeWidth="1" opacity=".75" />
              <circle cx={center} cy={center} r={chartR * .33} fill="none" stroke="#e8edf3" strokeWidth="1" opacity=".75" />

              {oppositeLines.map(function(pair, i) {
                const a = point(pair[0], chartR + 16);
                const b = point(pair[1], chartR + 16);
                return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#e2e8f0" strokeWidth="1" opacity=".55" />;
              })}

              <polygon points={radarPoints} fill="rgba(255,154,162,.13)" stroke="url(#rainbowStroke)" strokeWidth="2" opacity=".95" />

              {ordered.map(function(cat, i) {
                const p = point(i, iconR);
                const dot = point(i, 20 + (cat.score / 5) * radarMaxR);
                return (
                  <g key={cat.id}>
                    <line x1={center} y1={center} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1" opacity=".35" />
                    <circle cx={dot.x} cy={dot.y} r="4" fill={cat.color} opacity=".9" />
                    <foreignObject x={p.x - 30} y={p.y - 30} width="60" height="60">
                      <div className="w-[60px] h-[60px] rounded-full bg-white/60 border border-white/80 backdrop-blur-md flex items-center justify-center shadow-sm">
                        <CategoryIcon id={cat.id} color={cat.color} size={34} />
                      </div>
                    </foreignObject>
                  </g>
                );
              })}
            </svg>
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState('cover');
      const [answers, setAnswers] = useState([]);
      const qIdx = answers.length;
      const catIdx = Math.floor(qIdx / 5);
      const currentCat = categories[catIdx];
      const currentQuestionIndex = qIdx % 5;
      const currentChoices = currentCat ? answerChoices[currentCat.id][currentQuestionIndex] : null;
      const progress = Math.round((answers.length / 40) * 100);

      function handleAnswer(value) {
        const nextAnswers = answers.concat(value);
        if (nextAnswers.length >= 40) {
          setAnswers(nextAnswers);
          setStep('result');
        } else {
          setAnswers(nextAnswers);
        }
      }

      function reset() {
        setAnswers([]);
        setStep('cover');
      }

      if (step === 'cover') return (
        <main className="glass-card rounded-[3rem] p-6 sm:p-12 text-center text-reveal relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full rainbow-line"></div>
          <div className="pt-7">
            <p className="text-xs font-bold tracking-[0.36em] text-slate-400 uppercase mb-4">Happy Life Rainbow™</p>
            <h1 className="serif text-3xl sm:text-5xl font-light tracking-[0.06em] leading-tight text-slate-800 mb-4">心の虹<br className="sm:hidden" />バランスチェック</h1>
            <p className="text-sm sm:text-base text-slate-500 leading-loose mb-8">8つの視点で見える、いまのわたしの状態。<br />もやもやは、まだ言葉になっていないサインです。</p>
          </div>

          <section className="cover-orbit mb-10" aria-label="8 categories">
            <div className="absolute inset-[28%] rounded-full border border-white/50 bg-white/20 backdrop-blur-sm"></div>
            <div className="absolute inset-0 flex items-center justify-center">
              <div className="w-36 h-36 sm:w-44 sm:h-44 rounded-full bg-white/46 border border-white/70 backdrop-blur-xl shadow-sm flex items-center justify-center p-8">
                <img src="/mnt/data/logo.png" alt="Happy Life Rainbow Logo" className="w-full h-full object-contain opacity-90" />
              </div>
            </div>
            {categories.map(function(cat, i) {
              return <div key={cat.id} className="orbit-icon" style={{ '--angle': (i * 45) + 'deg', '--c': cat.color }} title={cat.jp}><CategoryIcon id={cat.id} color={cat.color} size={40} /></div>;
            })}
          </section>

          <button onClick={() => setStep('quiz')} className="btn-rainbow text-white font-black rounded-full px-10 py-4 shadow-lg">虹をひらく</button>
          <p className="mt-5 text-xs text-slate-400">答えは正解・不正解ではなく、今の感覚を知るためのものです。</p>
        </main>
      );

      if (step === 'quiz') return (
        <main className="glass-card rounded-[3rem] p-6 sm:p-12 text-reveal min-h-[620px] flex flex-col relative overflow-hidden">
          <div className="absolute top-0 left-0 h-1 bg-gradient-to-r from-pink-300 via-yellow-300 to-sky-300 transition-all" style={{ width: progress + '%' }}></div>

          <header className="mb-12 pt-4">
            <div className="flex items-center justify-between gap-4 mb-8">
              <div className="flex items-center gap-4">
                <div className="w-16 h-16 rounded-3xl theme-card flex items-center justify-center" style={{ '--c': currentCat.color }}><CategoryIcon id={currentCat.id} color={currentCat.color} size={42} /></div>
                <div>
                  <p className="text-xs font-bold tracking-[0.25em] text-slate-400">{currentCat.name}</p>
                  <h2 className="text-2xl font-black" style={{ color: currentCat.color }}>{currentCat.jp}</h2>
                </div>
              </div>
              <p className="text-xs font-bold text-slate-300">{answers.length + 1} / 40</p>
            </div>

            <div className="theme-card rounded-[2rem] p-5" style={{ '--c': currentCat.color }}>
              <p className="text-xs font-bold tracking-[0.16em] mb-2" style={{ color: currentCat.color }}>この領域のテーマ</p>
              <p className="text-sm text-slate-600 leading-relaxed">{currentCat.role}</p>
            </div>
          </header>

          <div className="flex-1 flex flex-col justify-center">
            <p className="text-xs font-bold tracking-[0.28em] text-slate-400 mb-6">QUESTION</p>
            <h3 className="text-xl sm:text-2xl font-light leading-relaxed text-slate-700 mb-12 min-h-[110px]">{currentCat.questions[currentQuestionIndex]}</h3>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <button onClick={() => handleAnswer(1)} className="py-5 px-5 bg-white/72 hover:bg-white rounded-2xl border border-white transition-all text-sm sm:text-base font-bold text-slate-600 shadow-sm">{currentChoices.yes}</button>
              <button onClick={() => handleAnswer(0)} className="py-5 px-5 bg-white/72 hover:bg-white rounded-2xl border border-white transition-all text-sm sm:text-base font-bold text-slate-600 shadow-sm">{currentChoices.no}</button>
            </div>
          </div>
        </main>
      );

      const insight = analyze(answers);

      if (step === 'result') return (
        <main className="glass-card rounded-[3rem] p-6 sm:p-12 text-reveal max-h-[92vh] overflow-y-auto custom-scrollbar relative">
          <div className="absolute top-0 left-0 w-full rainbow-line"></div>

          <header className="text-center mb-14 pt-6">
            <p className="text-xs font-bold tracking-[0.32em] text-slate-400 uppercase mb-4">Happy Life Rainbow™</p>
            <h2 className="text-4xl sm:text-6xl font-light tracking-[0.16em] text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-yellow-300 to-sky-300 uppercase">Insight Report</h2>
            <p className="serif mt-5 text-sm tracking-[0.28em] text-slate-400 italic">心の空に、いま見えている虹。</p>
          </header>

          <section className="soft-card rounded-[2.5rem] p-7 sm:p-10 mb-10 text-center">
            <p className="text-sm sm:text-base text-slate-600 leading-loose">今回のチェックから、いまのあなたの内側の状態がやさしく浮かび上がってきました。<br />これは良い・悪いを判断するものではなく、整えていくヒントを見つけるためのレポートです。</p>
          </section>

          <CategoryCircleChart scored={insight.scored} />

          <section className="soft-card rounded-[2.5rem] p-8 sm:p-10 mb-10">
            <p className="text-xs font-bold tracking-[0.25em] text-slate-400 mb-4">いまのあなたの整えポイント</p>
            <h3 className="text-2xl sm:text-3xl font-black text-slate-800 mb-5">{insight.totalLabel}</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base">{insight.totalMessage}</p>
          </section>

          <section className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
            {[insight.top, insight.second, insight.third].map(function(cat, index) {
              const level = getMoyamoyaLevel(cat.score);
              return (
                <div key={cat.id} className="theme-card rounded-[2rem] p-6" style={{ '--c': cat.color }}>
                  <div className="flex items-center justify-between mb-4">
                    <CategoryIcon id={cat.id} color={cat.color} size={38} />
                    <span className="text-xs font-black text-slate-300">0{index + 1}</span>
                  </div>
                  <h4 className="font-black text-lg mb-1" style={{ color: cat.color }}>{cat.jp}</h4>
                  <p className="text-xs text-slate-400 mb-3">{cat.layer}</p>
                  <span className={'inline-block text-[10px] font-bold border rounded-full px-3 py-1 mb-4 ' + level.badge}>もやもや指数 {cat.percent}% / {level.label}</span>
                  <p className="text-xs sm:text-sm text-slate-600 leading-relaxed">{level.tone}</p>
                </div>
              );
            })}
          </section>

          <section className="space-y-5 mb-10">
            {insight.scored.map(function(cat) {
              const level = getMoyamoyaLevel(cat.score);
              return (
                <article key={cat.id} className="theme-card rounded-[2.2rem] p-6 sm:p-8" style={{ '--c': cat.color }}>
                  <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-5">
                    <div className="flex items-center gap-4">
                      <div className="w-14 h-14 rounded-2xl bg-white/54 border border-white/70 flex items-center justify-center"><CategoryIcon id={cat.id} color={cat.color} size={34} /></div>
                      <div>
                        <p className="text-xs font-bold tracking-[0.24em] text-slate-400">{cat.name}</p>
                        <h4 className="text-xl font-black" style={{ color: cat.color }}>{cat.jp}</h4>
                      </div>
                    </div>
                    <span className={'self-start sm:self-center inline-block text-[11px] font-bold border rounded-full px-3 py-1 ' + level.badge}>もやもや指数 {cat.percent}% / {level.label}</span>
                  </div>
                  <h5 className="serif text-lg sm:text-xl text-slate-800 mb-4">{cat.reportTitle}</h5>
                  <p className="text-sm sm:text-base text-slate-600 leading-loose mb-4">{cat.report}</p>
                  <p className="text-sm sm:text-base text-slate-600 leading-loose">ここから少しずつ、{cat.action}</p>
                </article>
              );
            })}
          </section>

          <section className="soft-card rounded-[2.5rem] p-8 sm:p-10 mb-10">
            <p className="text-xs font-bold tracking-[0.25em] text-slate-400 mb-4">RAINBOW CONNECTION</p>
            <h3 className="text-2xl font-black text-slate-800 mb-5">{insight.pairTheme}</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base">特に「{insight.top.jp}」と、その向かい側にある「{insight.opposite.jp}」の関係性には、今のあなたを整えるヒントがあります。ひとつの領域だけを変えようとせず、つながりとして眺めることで、心の虹はより自然に整っていきます。</p>
          </section>

          <section className="text-center rounded-[2.5rem] p-8 sm:p-10 bg-gradient-to-r from-pink-50/70 via-yellow-50/70 to-sky-50/70 border border-white/80 mb-8">
            <p className="serif text-xl sm:text-2xl text-slate-700 leading-loose mb-5">もやもやは、変化の入り口です。</p>
            <p className="text-sm text-slate-500 leading-loose">いま感じている違和感や揺らぎは、これからの自分にとって大切なヒントになります。<br />心に虹のかかる毎日を。
ここから、あなたのペースで整えていきましょう。</p>
          </section>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button onClick={reset} className="py-4 rounded-full bg-white/72 hover:bg-white border border-white text-slate-500 font-bold transition-all">もう一度チェックする</button>
            <a href={bookingUrl} className="btn-rainbow text-center py-4 rounded-full text-white font-black shadow-lg">無料セッションへ進む</a>
          </div>
        </main>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
