<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Life Rainbow™ | 診断アプリ</title>
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');

    :root {
      --mental: #f6a6c8;
      --health: #ef8f8f;
      --work: #f4d35e;
      --money: #b9d86b;
      --learning: #62b66e;
      --hobby: #7ed6df;
      --living: #5dade2;
      --relation: #a084dc;
      --ink: #243042;
      --muted: #7b8794;
      --gold: #c5a059;
      --rose: #ec407a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
      background: #ffffff;
      overflow-x: hidden;
    }

    .aurora-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 15% 12%, rgba(246,166,200,.24), transparent 28%),
        radial-gradient(circle at 88% 16%, rgba(126,214,223,.20), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(185,216,107,.18), transparent 32%),
        linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
    }

    .glass-card {
      background: rgba(255,255,255,.74);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1px solid rgba(255,255,255,.82);
      box-shadow: 0 38px 90px rgba(31,41,55,.07);
    }

    .serif { font-family: 'Noto Serif JP', serif; }

    .text-reveal {
      animation: textReveal 1.1s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes textReveal {
      from { opacity: 0; transform: translateY(16px); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .btn-rainbow {
      background: linear-gradient(90deg, #f6a6c8, #ef8f8f, #f4d35e, #b9d86b, #7ed6df, #a084dc);
      transition: all .35s cubic-bezier(.16, 1, .3, 1);
      letter-spacing: .08em;
    }

    .btn-rainbow:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(236,64,122,.18);
    }

    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 999px; }

    .soft-card {
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 16px 36px rgba(31,41,55,.045);
    }

    .rainbow-line {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mental), var(--health), var(--work), var(--money), var(--learning), var(--hobby), var(--living), var(--relation));
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-10">
  <div class="aurora-bg"></div>
  <div id="root" class="w-full max-w-4xl"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState } = React;

    const bookingUrl = 'https://example.com/free-session';

    const categories = [
      {
        id: 'mental', name: 'MENTAL', jp: 'メンタル', color: 'var(--mental)', icon: '♡', layer: '価値観・内面',
        role: 'すべての土台。心のあり方、自己肯定感、マインドセットを整える領域です。',
        disturbed: '自己否定や思考の固定が起きやすく、行動が止まりやすい状態。',
        balanced: '自分を信じる力が戻り、自然と選択と行動が軽くなる状態。',
        questions: [
          '本当は変わりたいのに、「自分には無理かもしれない」と感じることがある。',
          'うまくいかない理由を、自分の性格や過去のせいにしてしまうことがある。',
          '人と比べて、自分には足りないものばかり見えてしまうことがある。',
          '褒められても素直に受け取れず、「まだまだ」と思ってしまう。',
          '本音よりも、周りからどう見られるかを優先してしまうことがある。'
        ]
      },
      {
        id: 'health', name: 'HEALTH', jp: '健康', color: 'var(--health)', icon: '♧', layer: '身体・行動力',
        role: '行動力の源泉。体力、回復力、睡眠、生活リズムを支える領域です。',
        disturbed: '疲れやストレスが溜まり、集中力や前向きさが下がりやすい状態。',
        balanced: '心身の土台が安定し、自然に動き続けられる状態。',
        questions: [
          '自分の体調や疲れを後回しにして、無理を続けてしまうことがある。',
          '健康を整えたいと思っても、「忙しいから仕方ない」と諦めてしまう。',
          '休むことに罪悪感があり、つい予定を詰め込んでしまう。',
          '睡眠・食事・運動を整えたいと思いながら、後回しになりやすい。',
          '体からの小さなサインに気づいても、まだ大丈夫だと思ってしまう。'
        ]
      },
      {
        id: 'work', name: 'WORK', jp: '仕事', color: 'var(--work)', icon: '▣', layer: '社会・価値発揮',
        role: '価値発揮の場。役割、キャリア、貢献、社会との接点を表します。',
        disturbed: 'やりがいや自己表現が弱まり、働き方への違和感が強まりやすい状態。',
        balanced: '自分の価値を実感し、貢献と成長がつながる状態。',
        questions: [
          '今の仕事や役割に違和感があっても、「これが現実だから」と我慢している。',
          '自分の本当にやりたい仕事を考えると、現実的ではない気がしてしまう。',
          '仕事で評価されるために、自分らしさを抑えていると感じることがある。',
          '本当は挑戦したいことがあっても、安定を手放すのが怖い。',
          '自分の強みや価値が、仕事で十分に活かされていない気がする。'
        ]
      },
      {
        id: 'money', name: 'MONEY', jp: 'お金', color: 'var(--money)', icon: '¥', layer: '選択肢・安心感',
        role: '人生の選択肢。収入、支出、価値交換、豊かさを受け取る力を扱います。',
        disturbed: '不安や罪悪感から、選択や自己投資にブレーキがかかりやすい状態。',
        balanced: 'お金の使い方・受け取り方に納得感があり、選択肢が広がる状態。',
        questions: [
          'お金を使うことに、どこか罪悪感や不安を感じることがある。',
          '自分がもっと豊かになっていい、とは心から思えないことがある。',
          'お金の話をすることに、抵抗感や恥ずかしさがある。',
          '欲しいものがあっても、「自分には贅沢かも」と思ってしまう。',
          '収入や価格を上げることに、どこか申し訳なさを感じる。'
        ]
      },
      {
        id: 'learning', name: 'LEARNING', jp: '学び', color: 'var(--learning)', icon: '□', layer: '未来・成長',
        role: '未来を広げる力。知識、スキル、探究、可能性を育てる領域です。',
        disturbed: '完璧主義や比較によって、新しい一歩を止めやすい状態。',
        balanced: '小さく試しながら吸収し、未来の選択肢が広がる状態。',
        questions: [
          '学びたい気持ちはあるのに、「今さら遅い」と感じることがある。',
          '新しいことを始める前に、失敗や継続できない自分を想像して止まってしまう。',
          '完璧に準備できるまで、始めない方がいいと思ってしまう。',
          '学んでも結果につながらなかったらどうしよう、と不安になる。',
          '自分より詳しい人を見ると、始める前から自信をなくしてしまう。'
        ]
      },
      {
        id: 'hobby', name: 'HOBBY', jp: '趣味', color: 'var(--hobby)', icon: '♪', layer: '彩り・創造性',
        role: '人生の彩り。楽しさ、余白、遊び心、創造性を取り戻す領域です。',
        disturbed: '楽しむことへの罪悪感から、心の余白や発想力が減りやすい状態。',
        balanced: '楽しさがエネルギーとなり、日常と成長に彩りが生まれる状態。',
        questions: [
          '好きなことをする時間に、どこか罪悪感を覚えることがある。',
          '趣味や楽しみは「余裕がある人のもの」だと思ってしまう。',
          '役に立つことや成果につながることを優先し、楽しみを後回しにしやすい。',
          '自分が何を好きなのか、すぐに答えられないことがある。',
          '楽しんでいる自分を、人に見せるのが少し恥ずかしい。'
        ]
      },
      {
        id: 'living', name: 'LIVING', jp: '暮らし', color: 'var(--living)', icon: '⌂', layer: '日常・環境',
        role: '日常の質。住まい、時間、生活習慣、心地よい環境を整える領域です。',
        disturbed: '日々をこなす感覚が強くなり、心地よさや安定感が薄れやすい状態。',
        balanced: '環境が整い、安心して自分らしく過ごせる状態。',
        questions: [
          '本当は暮らし方を変えたいのに、「今の環境では難しい」と思っている。',
          '自分が心地よく過ごすことより、日々をこなすことを優先している。',
          '住まいや持ち物、時間の使い方に違和感があっても見ないふりをしている。',
          '理想の暮らしを考えると、今の自分にはまだ遠いと感じる。',
          '日常を整えることより、目の前の予定をこなすことが多い。'
        ]
      },
      {
        id: 'relation', name: 'RELATIONSHIP', jp: '人間関係', color: 'var(--relation)', icon: '♢', layer: 'つながり・安心',
        role: '人生の満足度。家族、友人、職場、信頼、安心してつながる力を扱います。',
        disturbed: '遠慮や我慢が増え、本音や安心感が見えにくくなる状態。',
        balanced: '安心して頼り合い、自分らしい関係性を育てられる状態。',
        questions: [
          '本音を言うと嫌われる、迷惑をかける、と思ってしまうことがある。',
          '人に頼るより、自分で抱え込んだ方が楽だと感じることがある。',
          '相手に合わせすぎて、自分の気持ちが分からなくなることがある。',
          '断ることやお願いすることに、強いハードルを感じる。',
          '本当はもっと安心してつながりたいのに、距離を取ってしまうことがある。'
        ]
      }
    ];

    const oppositePairs = {
      mental: 'learning', learning: 'mental',
      health: 'hobby', hobby: 'health',
      work: 'living', living: 'work',
      money: 'relation', relation: 'money'
    };

    const adjacentNext = {
      mental: 'health', health: 'work', work: 'money', money: 'learning',
      learning: 'hobby', hobby: 'living', living: 'relation', relation: 'mental'
    };

    const pairThemes = {
      'mental-learning': '内面と成長の対話',
      'health-hobby': 'エネルギーと楽しさの循環',
      'work-living': '役割と日常のバランス',
      'money-relation': '価値とつながりの関係性'
    };

    function getCategory(id) {
      return categories.find(function(c) { return c.id === id; });
    }

    function getLevel(score) {
      if (score >= 4) return { label: '見直し優先', tone: '今もっとも丁寧に見てあげたい領域です。', badge: 'bg-rose-50 text-rose-500 border-rose-100' };
      if (score >= 2) return { label: '揺らぎあり', tone: '小さな違和感がサインとして現れています。', badge: 'bg-amber-50 text-amber-600 border-amber-100' };
      return { label: '比較的安定', tone: '今のところ大きな乱れは少ない領域です。', badge: 'bg-emerald-50 text-emerald-600 border-emerald-100' };
    }

    function normalizePair(a, b) {
      const order = categories.map(function(c) { return c.id; });
      return order.indexOf(a) < order.indexOf(b) ? a + '-' + b : b + '-' + a;
    }

    function generateInsight(scores) {
      const scored = categories
        .map(function(c) { return Object.assign({}, c, { score: scores[c.id] || 0 }); })
        .sort(function(a, b) { return b.score - a.score; });

      const top = scored[0];
      const second = scored[1];
      const third = scored[2];
      const total = scored.reduce(function(sum, c) { return sum + c.score; }, 0);
      const average = total / categories.length;
      const opposite = getCategory(oppositePairs[top.id]);
      const next = getCategory(adjacentNext[top.id]);
      const pairKey = normalizePair(top.id, opposite.id);
      const pairTheme = pairThemes[pairKey] || '人生の本質テーマ';

      let totalLabel = '静かな見直し期';
      let totalMessage = '全体として大きく崩れているというより、いくつかの領域に小さな違和感が出始めている状態です。今のうちに丁寧に言語化すると、未来の選択が軽くなります。';

      if (total >= 26) {
        totalLabel = '人生の再設計期';
        totalMessage = '複数のカテゴリーにサインが出ています。これは悪い結果ではなく、これまでの生き方を一度見直し、価値観から人生を再設計するタイミングです。';
      } else if (total >= 16) {
        totalLabel = 'バランス調整期';
        totalMessage = 'いくつかの領域でエネルギーの偏りが見えています。小さな一歩を整えることで、隣り合うカテゴリーにも良い連鎖が広がりやすい状態です。';
      } else if (total <= 7) {
        totalLabel = '安定と拡張期';
        totalMessage = '全体のバランスは比較的安定しています。次は「整える」だけでなく、理想のビジョンに向けて可能性を広げるタイミングです。';
      }

      return { scored, top, second, third, total, average, opposite, next, pairTheme, totalLabel, totalMessage };
    }

    function runTests() {
      console.assert(categories.length === 8, '8カテゴリーが必要です');
      console.assert(categories.every(function(c) { return c.questions.length === 5; }), '各カテゴリーに5問必要です');
      console.assert(oppositePairs.mental === 'learning' && oppositePairs.learning === 'mental', 'メンタル×学びの対面定義が必要です');
      console.assert(adjacentNext.relation === 'mental', '隣接関係は人間関係からメンタルへ循環する必要があります');
      const maxScores = categories.reduce(function(acc, c) { acc[c.id] = 5; return acc; }, {});
      console.assert(generateInsight(maxScores).total === 40, '最大スコアは40点です');
      console.assert(generateInsight({ mental: 5 }).top.id === 'mental', '最高スコアカテゴリーがTOPになる必要があります');
    }
    runTests();

    function App() {
      const [step, setStep] = useState('welcome');
      const [qIdx, setQIdx] = useState(0);
      const [scores, setScores] = useState({});

      const totalQs = categories.length * 5;
      const currentCat = categories[Math.floor(qIdx / 5)] || categories[0];
      const progress = ((qIdx + 1) / totalQs) * 100;

      function handleAnswer(val) {
        const nextScores = Object.assign({}, scores, { [currentCat.id]: (scores[currentCat.id] || 0) + val });
        setScores(nextScores);
        if (qIdx < totalQs - 1) setQIdx(qIdx + 1);
        else setStep('result');
      }

      const insight = generateInsight(scores);

      if (step === 'welcome') return (
        <main className="glass-card rounded-[3rem] p-9 sm:p-16 text-center text-reveal overflow-hidden relative">
          <div className="absolute top-0 left-0 w-full rainbow-line"></div>
          <div className="flex justify-center mb-8">
            <img src="logo.png" alt="Happy Life Rainbow" className="h-24 object-contain" />
          </div>
          <p className="text-[11px] tracking-[0.35em] text-[#c5a059] font-bold uppercase mb-5">Potential Bias Diagnostic</p>
          <h1 className="text-2xl sm:text-4xl font-light tracking-[0.18em] text-slate-800 mb-8">ハッピーライフレインボー診断</h1>
          <p className="text-slate-500 text-sm sm:text-base leading-loose mb-12 max-w-2xl mx-auto">
            人生を8つのカテゴリーから見つめ、今のあなたに起きている小さなサインと、未来へつながる一歩を可視化します。
          </p>
          <button onClick={() => setStep('quiz')} className="w-full max-w-sm py-5 btn-rainbow text-white rounded-full text-xs font-bold shadow-xl">
            診断をはじめる
          </button>
          <p className="serif mt-10 text-sm tracking-[0.35em] text-slate-400 italic">心に虹のかかる毎日を。</p>
        </main>
      );

      if (step === 'quiz') return (
        <main className="glass-card rounded-[3rem] p-8 sm:p-14 text-reveal overflow-hidden relative">
          <div className="absolute top-0 left-0 h-1 transition-all duration-700" style={{ width: progress + '%', backgroundColor: currentCat.color }}></div>

          <div className="flex justify-between items-end mb-10">
            <div>
              <p className="text-[10px] tracking-[0.35em] text-slate-400 font-bold mb-2 uppercase">{currentCat.name}</p>
              <h2 className="text-2xl font-bold flex items-center gap-3" style={{ color: currentCat.color }}>
                <span className="text-3xl">{currentCat.icon}</span>{currentCat.jp}
              </h2>
            </div>
            <p className="text-xs font-mono text-slate-300">{qIdx + 1} / {totalQs}</p>
          </div>

          <div className="soft-card rounded-[2rem] p-6 mb-10">
            <p className="text-xs text-slate-400 font-bold tracking-widest mb-2">この領域のテーマ</p>
            <p className="text-sm text-slate-600 leading-relaxed">{currentCat.role}</p>
          </div>

          <h3 className="text-xl sm:text-2xl font-light leading-relaxed text-slate-700 mb-16 min-h-[110px]">
            {currentCat.questions[qIdx % 5]}
          </h3>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <button onClick={() => handleAnswer(1)} className="py-5 bg-white/70 hover:bg-white rounded-2xl border border-white transition-all text-sm font-bold text-slate-600 shadow-sm">
              はい、当てはまる
            </button>
            <button onClick={() => handleAnswer(0)} className="py-5 bg-white/70 hover:bg-white rounded-2xl border border-white transition-all text-sm font-bold text-slate-600 shadow-sm">
              いいえ、今は違う
            </button>
          </div>
        </main>
      );

      if (step === 'result') return (
        <main className="glass-card rounded-[3rem] p-6 sm:p-12 text-reveal max-h-[92vh] overflow-y-auto custom-scrollbar relative">
          <div className="absolute top-0 left-0 w-full rainbow-line"></div>

          <header className="text-center mb-12 pt-4">
            <p className="text-[10px] font-bold tracking-[0.4em] text-[#c5a059] uppercase opacity-80 mb-3">Diagnostic Insight Report</p>
            <h2 className="text-2xl sm:text-3xl font-light tracking-[0.16em] text-slate-800">診断結果</h2>
          </header>

          <section className="soft-card rounded-[2.5rem] p-7 sm:p-9 mb-8 text-center">
            <p className="text-xs font-bold text-slate-400 tracking-[0.25em] mb-3">総評</p>
            <h3 className="text-3xl font-black mb-5" style={{ color: insight.top.color }}>{insight.totalLabel}</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base max-w-2xl mx-auto">{insight.totalMessage}</p>
            <div className="mt-7 inline-flex items-center gap-3 px-5 py-3 rounded-full bg-white/70 border border-white text-xs text-slate-500">
              <span>合計スコア</span>
              <b className="text-slate-800">{insight.total}</b>
              <span>/ 40</span>
            </div>
          </section>

          <section className="grid lg:grid-cols-3 gap-5 mb-8">
            {[insight.top, insight.second, insight.third].map(function(cat, idx) {
              const level = getLevel(cat.score);
              return (
                <div key={cat.id} className="soft-card rounded-[2rem] p-6">
                  <p className="text-[10px] tracking-[0.25em] text-slate-400 font-bold mb-3">TOP {idx + 1}</p>
                  <div className="flex items-center justify-between mb-4">
                    <h4 className="text-xl font-black" style={{ color: cat.color }}>{cat.jp}</h4>
                    <span className={'text-[10px] font-bold px-3 py-1 rounded-full border ' + level.badge}>{level.label}</span>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed mb-4">{cat.role}</p>
                  <p className="text-sm text-slate-700 leading-relaxed font-bold">{cat.score >= 3 ? cat.disturbed : cat.balanced}</p>
                </div>
              );
            })}
          </section>

          <section className="soft-card rounded-[2.5rem] p-7 sm:p-9 mb-8">
            <p className="text-xs font-bold text-[#ec407a] tracking-[0.25em] mb-5 text-center">あなたの本質テーマ</p>
            <div className="grid sm:grid-cols-3 gap-4 items-center text-center">
              <div className="rounded-[2rem] p-6 bg-white/60 border border-white">
                <p className="text-3xl mb-2" style={{ color: insight.top.color }}>{insight.top.icon}</p>
                <p className="font-black" style={{ color: insight.top.color }}>{insight.top.jp}</p>
              </div>
              <div>
                <p className="text-slate-300 text-3xl mb-2">×</p>
                <p className="font-black text-slate-700">{insight.pairTheme}</p>
                <p className="text-xs text-slate-400 leading-relaxed mt-3">対面カテゴリーは、人生のバランスや葛藤が現れやすい軸です。</p>
              </div>
              <div className="rounded-[2rem] p-6 bg-white/60 border border-white">
                <p className="text-3xl mb-2" style={{ color: insight.opposite.color }}>{insight.opposite.icon}</p>
                <p className="font-black" style={{ color: insight.opposite.color }}>{insight.opposite.jp}</p>
              </div>
            </div>
          </section>

          <section className="soft-card rounded-[2.5rem] p-7 sm:p-9 mb-8">
            <p className="text-xs font-bold text-[#c5a059] tracking-[0.25em] mb-5 text-center">連鎖のポイント</p>
            <p className="text-slate-600 text-sm leading-loose text-center max-w-2xl mx-auto mb-6">
              今回もっともサインが出ている「{insight.top.jp}」を整えると、隣り合う「{insight.next.jp}」にも良い影響が広がりやすくなります。
            </p>
            <div className="flex items-center justify-center gap-3 text-sm font-bold">
              <span className="px-5 py-3 rounded-full bg-white/70" style={{ color: insight.top.color }}>{insight.top.jp}</span>
              <span className="text-slate-300">→</span>
              <span className="px-5 py-3 rounded-full bg-white/70" style={{ color: insight.next.color }}>{insight.next.jp}</span>
            </div>
          </section>

          <section className="soft-card rounded-[2.5rem] p-7 sm:p-9 mb-10">
            <div className="text-center mb-8">
              <p className="text-xs font-bold text-slate-400 tracking-[0.25em] mb-3">8カテゴリー簡易解説</p>
              <p className="text-sm text-slate-500 leading-relaxed">スコアは「良い・悪い」ではなく、今どこに意識を向けると人生が動きやすいかを示すサインです。</p>
            </div>

            <div className="space-y-4">
              {insight.scored.map(function(cat) {
                const level = getLevel(cat.score);
                return (
                  <div key={cat.id} className="bg-white/55 rounded-2xl p-5 border border-white">
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                      <div className="flex items-center gap-3">
                        <span className="w-10 h-10 rounded-full flex items-center justify-center text-white font-black" style={{ backgroundColor: cat.color }}>{cat.icon}</span>
                        <div>
                          <h4 className="font-black text-slate-700">{cat.jp}</h4>
                          <p className="text-[10px] text-slate-400 tracking-widest">{cat.layer}</p>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={'text-[10px] font-bold px-3 py-1 rounded-full border ' + level.badge}>{level.label}</span>
                        <span className="text-xs font-bold text-slate-400">{cat.score}/5</span>
                      </div>
                    </div>
                    <div className="flex gap-1.5 mb-4">
                      {[0,1,2,3,4].map(function(i) {
                        return <div key={i} className="h-2 flex-1 rounded-full" style={{ backgroundColor: cat.score > i ? cat.color : '#eef2f7' }}></div>;
                      })}
                    </div>
                    <p className="text-xs sm:text-sm text-slate-600 leading-relaxed">{level.tone} {cat.score >= 3 ? cat.disturbed : cat.balanced}</p>
                  </div>
                );
              })}
            </div>
          </section>

          <section className="rounded-[2.5rem] p-8 sm:p-10 mb-10 text-center border border-pink-100 bg-gradient-to-br from-pink-50/80 via-white/85 to-cyan-50/80">
            <p className="text-xs font-bold tracking-[0.25em] text-[#ec407a] mb-4">NEXT STEP</p>
            <h3 className="text-2xl sm:text-3xl font-black text-slate-800 mb-5">この診断の“本当の意味”を知る</h3>
            <p className="text-slate-600 leading-loose text-sm sm:text-base max-w-2xl mx-auto mb-8">
              結果はゴールではなく、あなたの人生が動き出す入口です。初回無料カウンセリングでは、今回の結果をもとに「なぜそうなっているのか」と「どこから整えると変化が起きやすいのか」を一緒に読み解きます。
            </p>
            <div className="bg-white/70 rounded-2xl p-5 border border-white text-left max-w-2xl mx-auto mb-8">
              <p className="text-sm font-black text-slate-700 mb-3">無料セッションでわかること</p>
              <ul className="text-sm text-slate-600 leading-loose space-y-1">
                <li>✓ あなたの対面カテゴリーに現れている本質テーマ</li>
                <li>✓ 今のスコアの背景にある思い込みや認識のクセ</li>
                <li>✓ 無理なく整えるための最初の一歩</li>
              </ul>
            </div>
            <button onClick={() => { window.location.href = bookingUrl; }} className="w-full max-w-md py-5 btn-rainbow text-white rounded-full text-sm font-black shadow-xl">
              初回無料カウンセリングを予約する
            </button>
            <p className="text-[11px] text-slate-400 mt-4">※ bookingUrl を予約ページのURLに差し替えてください。</p>
          </section>

          <footer className="pt-8 border-t border-white text-center">
            <button onClick={() => window.location.reload()} className="text-slate-300 text-[10px] font-bold tracking-[0.3em] uppercase hover:text-slate-500 transition-all mb-8">
              Restart Journey
            </button>
            <p className="serif text-sm tracking-[0.45em] text-slate-400 font-light italic">心に虹のかかる毎日を。</p>
          </footer>
        </main>
      );

      return null;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
